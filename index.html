<!doctype html>
<html lang="tr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Plaka Sorgulama</title>

<link rel="manifest" href="./manifest.json">
<meta name="theme-color" content="#6366f1">
<link rel="apple-touch-icon" href="./apple-touch-icon.png">

<style>
:root{
  --bg1:#0a0f1e;
  --bg2:#0e152b;
  --card:#111936;
  --card2:#0f1a37;
  --text:#f1f5ff;
  --muted:#aab3ffb3;
  --pri:#6366f1;
  --pri2:#8b5cf6;
  --ok:#22c55e;
  --err:#f43f5e;
  --warn:#fbbf24;
  --line:rgba(255,255,255,.08);
  --shadow:0 20px 50px rgba(0,0,0,.45);
  --r:20px;
}

*{box-sizing:border-box}

body{
  font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial;
  margin:20px;
  max-width:820px;
  color:var(--text);
  background:
    radial-gradient(1200px 800px at 20% 10%, rgba(139,92,246,.25), transparent 55%),
    radial-gradient(900px 700px at 95% 0%, rgba(99,102,241,.22), transparent 50%),
    linear-gradient(135deg,var(--bg1),var(--bg2));
}

h2{margin:0 0 6px}
.muted{color:var(--muted);font-size:13px;line-height:1.4}
.wrap{margin-top:14px}

/* Tabs */
.tabs{display:flex;gap:10px;margin:14px 0}
.tab{
  padding:10px 18px;
  border-radius:999px;
  background:rgba(255,255,255,.06);
  border:1px solid var(--line);
  cursor:pointer;
  user-select:none;
  transition:.25s;
}
.tab:hover{background:rgba(255,255,255,.12)}
.tab.active{
  background:linear-gradient(135deg,var(--pri),var(--pri2));
  border:none;
  box-shadow:0 8px 30px rgba(99,102,241,.45);
}

/* Cards */
.card{
  margin-top:14px;
  padding:14px;
  border-radius:var(--r);
  background:linear-gradient(180deg,rgba(255,255,255,.08),rgba(255,255,255,.02));
  border:1px solid var(--line);
  box-shadow:var(--shadow);
  backdrop-filter:blur(12px);
}
.cardInner{
  border-radius:calc(var(--r) - 6px);
  background:rgba(17,25,54,.55);
  border:1px solid rgba(255,255,255,.06);
  padding:14px;
}

/* Inputs */
input, textarea{
  width:100%;
  font-size:16px;
  padding:13px 16px;
  border-radius:14px;
  border:1px solid rgba(255,255,255,.12);
  background:rgba(10,16,34,.6);
  color:var(--text);
  outline:none;
  transition:.2s;
}
textarea{
  min-height:190px;
  font-family:ui-monospace,monospace;
  font-size:13px;
}
input:focus, textarea:focus{
  border-color:var(--pri);
  box-shadow:0 0 0 4px rgba(99,102,241,.25);
}

/* Buttons */
button{
  padding:11px 16px;
  border-radius:14px;
  border:1px solid rgba(255,255,255,.12);
  background:rgba(255,255,255,.06);
  color:var(--text);
  cursor:pointer;
  font-weight:500;
  transition:.25s;
}
button:hover{
  transform:translateY(-1px);
  background:rgba(255,255,255,.12);
}
button.primary{
  background:linear-gradient(135deg,var(--pri),var(--pri2));
  border:none;
  box-shadow:0 10px 30px rgba(99,102,241,.35);
}
button.primary:hover{
  box-shadow:0 14px 40px rgba(139,92,246,.45);
}
button.ok{
  background:rgba(34,197,94,.15);
  border-color:rgba(34,197,94,.4);
}
button.danger{
  background:rgba(244,63,94,.15);
  border-color:rgba(244,63,94,.45);
}

/* Helpers */
.row{display:flex;gap:10px;flex-wrap:wrap;margin-top:10px}
.hr{height:1px;background:var(--line);margin:12px 0}
label{font-size:13px;color:var(--muted)}
.pill{
  display:inline-block;
  padding:4px 10px;
  border-radius:999px;
  font-size:12px;
  border:1px solid rgba(255,255,255,.14);
  background:rgba(255,255,255,.06)
}
.okBox{border-color:rgba(34,197,94,.45)}
.errBox{border-color:rgba(244,63,94,.45)}
.warnBox{border-color:rgba(251,191,36,.5)}
</style>
</head>

<body>
