<!doctype html>
<html lang="tr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Plaka Sorgulama</title>

<link rel="manifest" href="./manifest.json">
<meta name="theme-color" content="#6366f1">
<link rel="apple-touch-icon" href="./apple-touch-icon.png">

<style>
:root{
  --bg1:#0a0f1e;
  --bg2:#0e152b;
  --cardGlass:rgba(17,25,54,.55);
  --text:#f1f5ff;
  --muted:#aab3ffb3;
  --pri:#6366f1;
  --pri2:#8b5cf6;
  --ok:#22c55e;
  --err:#f43f5e;
  --warn:#fbbf24;
  --line:rgba(255,255,255,.08);
  --shadow:0 20px 50px rgba(0,0,0,.45);
  --r:20px;
}
*{box-sizing:border-box}
body{
  font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial;
  margin:20px;
  max-width:820px;
  color:var(--text);
  background:
    radial-gradient(1200px 800px at 20% 10%, rgba(139,92,246,.25), transparent 55%),
    radial-gradient(900px 700px at 95% 0%, rgba(99,102,241,.22), transparent 50%),
    linear-gradient(135deg,var(--bg1),var(--bg2));
}
h2{margin:0 0 6px}
.muted{color:var(--muted); font-size:13px}
.wrap{margin-top:14px}

/* Tabs */
.tabs{display:flex; gap:10px; margin:14px 0}
.tab{
  padding:10px 18px;
  border-radius:999px;
  background:rgba(255,255,255,.06);
  border:1px solid var(--line);
  cursor:pointer;
  font-weight:500;
  transition:.25s;
}
.tab:hover{background:rgba(255,255,255,.12)}
.tab.active{
  background:linear-gradient(135deg,var(--pri),var(--pri2));
  box-shadow:0 8px 30px rgba(99,102,241,.45);
  border:none;
}

/* Cards */
.card{
  margin-top:16px;
  padding:16px;
  border-radius:var(--r);
  background:linear-gradient(180deg,rgba(255,255,255,.08),rgba(255,255,255,.02));
  border:1px solid var(--line);
  box-shadow:var(--shadow);
  backdrop-filter:blur(12px);
}
.cardInner{
  border-radius:calc(var(--r) - 6px);
  background:var(--cardGlass);
  border:1px solid rgba(255,255,255,.06);
  padding:16px;
}

/* Inputs */
input,textarea{
  width:100%;
  font-size:16px;
  padding:13px 16px;
  border-radius:14px;
  border:1px solid rgba(255,255,255,.12);
  background:rgba(10,16,34,.6);
  color:var(--text);
}
input:focus,textarea:focus{
  border-color:var(--pri);
  box-shadow:0 0 0 4px rgba(99,102,241,.25);
  outline:none;
}
textarea{min-height:180px;font-family:monospace;font-size:13px}

/* Buttons */
button{
  padding:11px 16px;
  border-radius:14px;
  border:1px solid rgba(255,255,255,.12);
  background:rgba(255,255,255,.06);
  color:var(--text);
  cursor:pointer;
  font-weight:500;
  transition:.25s;
}
button:hover{transform:translateY(-1px);background:rgba(255,255,255,.12)}
button.primary{
  background:linear-gradient(135deg,var(--pri),var(--pri2));
  border:none;
  box-shadow:0 10px 30px rgba(99,102,241,.35);
}
button.ok{background:rgba(34,197,94,.15);border-color:rgba(34,197,94,.4)}
button.danger{background:rgba(244,63,94,.15);border-color:rgba(244,63,94,.45)}

.row{display:flex;gap:10px;flex-wrap:wrap;margin-top:10px}
label{font-size:13px;color:var(--muted)}
.hr{height:1px;background:var(--line);margin:12px 0}

/* 🇹🇷 Plaka Görünümü */
.plate{
  display:inline-flex;
  align-items:center;
  background:#fff;
  color:#000;
  border-radius:8px;
  overflow:hidden;
  font-family:Arial,Helvetica,sans-serif;
  box-shadow:0 6px 20px rgba(0,0,0,.35);
}
.plate .tr{
  background:#0033a0;
  color:#fff;
  padding:6px 8px;
  font-size:11px;
  text-align:center;
}
.plate .num{
  padding:6px 14px;
  font-size:20px;
  font-weight:bold;
  letter-spacing:2px;
}
.plateInfo{
  margin-top:10px;
  font-size:14px;
}
</style>
</head>

<body>

<h2>🚗 Plaka Sorgulama</h2>
<div class="muted">06ABC06 / 06 ABC 06 / 06-ABC-06</div>

<div class="tabs">
  <div class="tab active" id="tabSearch">Sorgu</div>
  <div class="tab" id="tabAdmin">Veri Yönetimi</div>
</div>

<div id="viewSearch" class="wrap">
  <div class="card">
    <div class="cardInner">
      <label>Plaka</label>
      <input id="q" placeholder="Plaka yazın..." />
      <div class="row">
        <button id="clear">Temizle</button>
        <button class="primary" id="paste">Panodan Yapıştır</button>
      </div>

      <div id="out" class="card">Sonuç burada görünecek.</div>
    </div>
  </div>
</div>

<div id="viewAdmin" style="display:none" class="wrap">
  <div class="card"><div class="cardInner">
    <label>CSV</label>
    <textarea id="csv"></textarea>
    <div class="row">
      <button class="primary" id="import">Kaydet</button>
      <button id="export">Dışa Aktar</button>
    </div>
    <div id="adminOut" class="card muted">Durum: —</div>
  </div></div>
</div>

<script>
function norm(s){return (s||"").toUpperCase().replace(/[^A-Z0-9]/g,"")}
const STORAGE_KEY="plaka_data";
let DATA=[]; let IDX=new Map();

function rebuild(){
  IDX=new Map();
  DATA.forEach(r=>IDX.set(norm(r.plaka),r));
}

const q=document.getElementById("q");
const out=document.getElementById("out");

function render(){
  const raw=q.value;
  const k=norm(raw);
  if(!k){out.textContent="Sonuç burada görünecek.";return}
  const r=IDX.get(k);
  if(!r){
    out.innerHTML="❌ Bulunamadı";
    return;
  }
  out.innerHTML=`
    <div class="plate">
      <div class="tr">TR<br>06</div>
      <div class="num">${raw.toUpperCase()}</div>
    </div>
    <div class="plateInfo">
      Blok: <b>${r.blok}</b><br>
      Daire: <b>${r.daire}</b>
    </div>`;
}

q.addEventListener("input",render);
document.getElementById("clear").onclick=()=>{q.value="";render()}
document.getElementById("paste").onclick=async()=>{
  q.value=(await navigator.clipboard.readText()).trim();
  render();
}

document.getElementById("tabSearch").onclick=()=>{
  viewSearch.style.display="";viewAdmin.style.display="none";
}
document.getElementById("tabAdmin").onclick=()=>{
  viewSearch.style.display="none";viewAdmin.style.display="";
}

document.getElementById("import").onclick=()=>{
  DATA=document.getElementById("csv").value.split("\n").map(l=>{
    const [plaka,blok,daire]=l.split(";");
    return {plaka,blok,daire};
  });
  localStorage.setItem(STORAGE_KEY,JSON.stringify(DATA));
  rebuild();
  adminOut.textContent="Kaydedildi";
};

document.getElementById("export").onclick=()=>{
  navigator.clipboard.writeText(document.getElementById("csv").value);
};

const saved=localStorage.getItem(STORAGE_KEY);
if(saved){DATA=JSON.parse(saved);rebuild()}
</script>

</body>
</html>
